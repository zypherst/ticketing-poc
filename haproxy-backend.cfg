global
    maxconn 10000
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option dontlognull
    
    # ----------------------------------------------------
    # การตั้งค่า Timeout พื้นฐาน
    # ----------------------------------------------------
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    
    # ----------------------------------------------------
    # 🌟 หัวใจสำคัญสำหรับ WebSockets (SignalR)
    # timeout tunnel คือเวลาที่อนุญาตให้ Connection เปิดค้างไว้ 
    # (ตั้งไว้ 1 ชั่วโมง = 3600 วินาที)
    # ----------------------------------------------------
    timeout tunnel  3600s 

frontend frontend_api
    # ผูกกับพอร์ต 5000 ตามที่ React Frontend คาดหวังจะเรียกใช้[cite: 2]
    bind *:5000
    
    # สามารถตั้งค่าดักจับ Path ได้ (ถ้ามีหลาย Backend)
    # acl is_api path_beg /api
    # acl is_signalr path_beg /ticketHub
    
    default_backend backend_api

backend backend_api
    # กระจายโหลดแบบ Round Robin
    balance roundrobin
    
    # ----------------------------------------------------
    # 🌟 Sticky Session (สำคัญมากสำหรับ SignalR)
    # ฝัง Cookie ชื่อ SERVERID เพื่อให้ User คนเดิมวิ่งไปหา Backend ตัวเดิมเสมอ
    # ป้องกันปัญหา WebSocket หลุดเมื่อโหลดบาลานซ์สลับเครื่อง
    # ----------------------------------------------------
    cookie SERVERID insert indirect nocache
    
    # ตั้งค่า Health Check เพื่อดูว่า Backend ตัวไหนพัง จะได้เลิกส่ง Request ไป
    # ใช้ Path ที่เราเพิ่งสร้างไปในการเช็คสถานะ
    option httpchk GET /api/ticket/branches
    
    # ----------------------------------------------------
    # รายชื่อ Backend Servers
    # สมมติว่าใน docker-compose.yml คุณสเกล C# Backend ไว้ 2 ตัว
    # ----------------------------------------------------
    server backend-1 backend-1:5000 cookie b1 check inter 10s fall 3 rise 2
    server backend-2 backend-2:5000 cookie b2 check inter 10s fall 3 rise 2
