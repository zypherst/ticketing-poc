global
    log stdout format raw local0

defaults
    log     global
    mode    tcp             # ⚠️ สำคัญมาก: ต้องเป็น TCP โหมดสำหรับ Database
    option  tcplog
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

# ด่านหน้ารับ Connection พอร์ต 5432 จาก Backend API ทั้ง 5 ตัว
frontend postgres_gate
    bind *:9999
    default_backend pgpool_cluster

# กระจายโหลดไปหา Pgpool-II ทั้ง 2 เครื่องแบบ Round-robin
backend pgpool_cluster
    balance roundrobin
    mode tcp
    # ใช้ option pgsql-check เพื่อให้ HAProxy คุยโปรโตคอล Postgres ไปเช็คสถานะ Pgpool ได้แม่นยำ
    option pgsql-check user postgres
    server pgpool1 pgpool-1:5432 check inter 2000 rise 2 fall 3
    server pgpool2 pgpool-2:5432 check inter 2000 rise 2 fall 3

# หน้า Dashboard สำหรับดูสถานะระบบ Pooling
frontend stats
    bind *:8405
    mode http
    stats enable
    stats uri /
    stats refresh 2s
