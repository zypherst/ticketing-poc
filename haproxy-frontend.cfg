global
    maxconn 20000
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client  50s
    timeout server  50s

frontend public_gateway
    bind *:80
    
    # -------------------------------------------------------------------
    # 🛡️ Security: Rate Limiting (จำกัด Request ต่อ IP)
    # -------------------------------------------------------------------
    # สร้าง Table เก็บสถิติ IP ขนาด 100k records, ลืมข้อมูลเมื่อผ่านไป 30 วิ
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    
    # ติดตาม IP ต้นทาง
    http-request track-sc0 src
    
    # ถ้า IP ใดๆ ยิงเกิน 50 requests ภายใน 10 วินาที ให้ปฏิเสธด้วย HTTP 429
    # (กฎนี้นับแยกเป็นราย IP ไม่ได้นับรวมทราฟฟิกทั้งเว็บ)
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 50 }

    # -------------------------------------------------------------------
    # 🌐 Routing & Domain
    # -------------------------------------------------------------------
    # ตัวอย่างการระบุ Domain จริง
    # acl is_booking_site hdr(host) -i booking.sfcinemacity.com

    # ตรวจสอบว่าเป็นเส้นทางของ API หรือ SignalR (WebSocket) หรือไม่
    acl is_api path_beg /api
    acl is_signalr path_beg /ticketHub

    # ถ้าใช่ ส่งไปที่กลุ่มของ Backend HAProxy
    use_backend backend_gateway if is_api || is_signalr
    
    # ถ้าไม่ใช่ ให้ส่งไปหา Nginx ที่รัน Frontend React ไว้
    default_backend frontend_servers

backend frontend_servers
    balance roundrobin
    # ส่งไปหาคอนเทนเนอร์ frontend ที่เรารัน Nginx ไว้ (Port 80)
    server ui-1 frontend-1:80 check
    server ui-2 frontend-2:80 check

backend backend_gateway
    # ส่งคำสั่งต่อไปยัง HAProxy Backend ที่ทำหน้าที่จัดการ API/DB ต่อไป
    server backend-lb haproxy-backend:5000 check
