global
    log stdout format raw local0

defaults
    log     global
    mode    tcp             # ⚠️ สำคัญ: ต้องเป็น TCP เพราะ NATS ไม่ใช่ HTTP
    option  tcplog
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

# ด่านหน้ารับ Connection จากภายนอก (เช่น NATS CLI, โค้ดบนเครื่อง Host)
frontend nats_front
    bind *:4222
    default_backend nats_cluster

# กระจายโหลดและเช็คสถานะ NATS ทั้ง 3 ตัว
backend nats_cluster
    balance roundrobin
    mode tcp
    # check เพื่อให้ HAProxy รู้ว่าตัวไหนตาย จะได้สลับคิวหนี
    server nats1 nats-1:4222 check
    server nats2 nats-2:4222 check
    server nats3 nats-3:4222 check

# Dashboard สำหรับดูสถานะของ NATS Cluster (ใช้พอร์ต 8406 เพื่อไม่ให้ชนกับฝั่ง DB)
frontend stats
    bind *:8406
    mode http
    stats enable
    stats uri /
    stats refresh 2s
